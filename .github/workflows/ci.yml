name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # x86_64 Linux build + test
  build-linux-x86:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [g++, clang++]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build library
        run: make lib CXX=${{ matrix.compiler }}
      - name: Build and run tests
        run: make test CXX=${{ matrix.compiler }}

  # AArch64 Linux build + test (cross-compiled, test via QEMU)
  build-linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu qemu-user-static
      - name: Build library
        run: make lib CXX=aarch64-linux-gnu-g++ ARCH=aarch64
      - name: Build test
        run: make build/test_standalone CXX=aarch64-linux-gnu-g++ ARCH=aarch64
      - name: Run test under QEMU
        run: qemu-aarch64-static -L /usr/aarch64-linux-gnu build/test_standalone

  # RISC-V 64 Linux build (cross-compiled)
  build-linux-riscv64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-riscv64-linux-gnu qemu-user-static
      - name: Build library
        run: make lib CXX=riscv64-linux-gnu-g++ ARCH=riscv64
      - name: Build test
        run: make build/test_standalone CXX=riscv64-linux-gnu-g++ ARCH=riscv64
      - name: Run test under QEMU
        run: qemu-riscv64-static -L /usr/riscv64-linux-gnu build/test_standalone || echo "QEMU test skipped (may need newer QEMU)"

  # Windows x86_64 build (cross-compiled with mingw-w64, compile-only)
  build-windows-x86:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw-w64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64
      - name: Build library
        run: make lib CXX=x86_64-w64-mingw32-g++ AR=x86_64-w64-mingw32-ar ARCH=x86_64
      - name: Build test
        run: make build/test_standalone CXX=x86_64-w64-mingw32-g++ AR=x86_64-w64-mingw32-ar ARCH=x86_64

  # Windows AArch64 build (cross-compiled via llvm-mingw, compile-only)
  build-windows-aarch64:
    runs-on: ubuntu-24.04
    env:
      LLVM_MINGW_VERSION: 20260421
    steps:
      - uses: actions/checkout@v4
      - name: Install llvm-mingw cross toolchain
        run: |
          curl -fsSL -o llvm-mingw.tar.xz \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          tar -xf llvm-mingw.tar.xz
          echo "$PWD/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"
      - name: Build library
        run: make lib CXX=aarch64-w64-mingw32-g++ AR=aarch64-w64-mingw32-ar ARCH=aarch64
      - name: Build test
        run: make build/test_standalone CXX=aarch64-w64-mingw32-g++ AR=aarch64-w64-mingw32-ar ARCH=aarch64

  # macOS x86_64
  build-macos-x86:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: make test

  # macOS AArch64 (Apple Silicon)
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: make test

  # Check that committed tables are up to date
  check-generated:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate tables
        run: make -f Makefile.generate
      - name: Check for differences
        run: |
          if ! git diff --exit-code generated/; then
            echo "::error::Generated tables are out of date. Run: make -f Makefile.generate"
            exit 1
          fi
